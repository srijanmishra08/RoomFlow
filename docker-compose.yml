services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roomflow
      POSTGRES_PASSWORD: roomflow
      POSTGRES_DB: roomflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://roomflow:roomflow@db:5432/roomflow"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  pgdata:
  uploads:
